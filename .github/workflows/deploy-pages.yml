name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install ImageMagick tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          if ! command -v magick >/dev/null 2>&1; then
            sudo tee /usr/local/bin/magick >/dev/null <<'EOF'
#!/usr/bin/env bash
set -euo pipefail

if [ "$#" -eq 0 ]; then
  echo "magick shim: missing arguments" >&2
  exit 2
fi

cmd="$1"
shift

case "$cmd" in
  identify|convert|mogrify|composite|montage|compare|import|animate|stream|conjure)
    exec "$cmd" "$@"
    ;;
  *)
    # ImageMagick 7 supports `magick <input> ...`; ImageMagick 6 equivalent is `convert <input> ...`.
    exec convert "$cmd" "$@"
    ;;
esac
          EOF
            sudo chmod +x /usr/local/bin/magick
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
